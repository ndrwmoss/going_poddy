# =========================
# nginx.conf (full version)
# =========================
worker_processes auto;

events {
  worker_connections 2048;
}

http {
  # --- Global basics ---
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 4096;

  # Allow big uploads/results
  client_max_body_size 1024M;

  # Generous proxy timeouts
  proxy_connect_timeout 600s;
  proxy_send_timeout    600s;
  proxy_read_timeout    600s;
  send_timeout          600s;

  # Robust WS upgrade header
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Common error page (optional)
  # Place a 502.html at /usr/share/nginx/html/ if you want a pretty failover
  # Otherwise nginx will send its default 502.
  # --------------------------------------------

  # =======================
  # 7860 -> 8188 (ComfyUI)
  # =======================
  server {
    listen 7860;
    server_name _;

    # Serve only the wait-page font directly to avoid
    # shadowing ComfyUI's own /assets/* files behind the proxy.
    # ComfyUI serves its JS/CSS from /assets/, so do NOT use a broad
    # "location ^~ /assets/" here.
    location = /assets/fonts/Inter-latin.woff2 {
      root /usr/share/nginx/html;
      try_files $uri =404;
      access_log off;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000";
    }

    # Deterministic readiness check for 8188: returns:
    # - 200 with body 'placeholder' while the placeholder server runs
    # - 502 while no process listens on 8188 during handoff
    # - 404 (or 200 non-'placeholder') once ComfyUI is up
    location = /ready {
      proxy_pass http://127.0.0.1:8188/status;
      proxy_intercept_errors off;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 5s;
      proxy_connect_timeout 2s;
      proxy_send_timeout 5s;
      add_header Cache-Control no-cache;
    }

    # Known WS endpoints for ComfyUI
    location ^~ /ws {
      proxy_pass http://127.0.0.1:8188;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_read_timeout 86400;
      add_header Cache-Control no-cache;
    }

    location ^~ /queue/join {
      proxy_pass http://127.0.0.1:8188;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_read_timeout 86400;
      add_header Cache-Control no-cache;
    }

    # Everything else (safe to always send WS headers)
    location / {
      proxy_pass http://127.0.0.1:8188;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Don't forward Accept-Encoding; avoids gzip on streaming endpoints
      proxy_set_header Accept-Encoding "";

      proxy_intercept_errors on;
      error_page 502 =200 @502;
      add_header Cache-Control no-cache;
    }

    location @502 {
      add_header Last-Modified $date_gmt;
      add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
      if_modified_since off; expires off; etag off;
      root /usr/share/nginx/html;
      rewrite ^ /502.html break;
    }
  }

  # =======================
  # 7861 -> 8080 (Filebrowser)
  # =======================
  server {
    listen 7861;
    server_name _;

    # Serve shared static assets (e.g., fonts) directly
    location ^~ /assets/ {
      root /usr/share/nginx/html;
      try_files $uri =404;
      access_log off;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000";
    }

    # Filebrowser sometimes exposes WS; future-proof it
    location ^~ /ws {
      proxy_pass http://127.0.0.1:8080;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_read_timeout 86400;
      add_header Cache-Control no-cache;
    }

    location / {
      proxy_pass http://127.0.0.1:8080;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Accept-Encoding "";

      proxy_intercept_errors on;
      error_page 502 =200 @502;
      add_header Cache-Control no-cache;
    }

    location @502 {
      add_header Last-Modified $date_gmt;
      add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
      if_modified_since off; expires off; etag off;
      root /usr/share/nginx/html;
      rewrite ^ /502.html break;
    }
  }

# =======================
# 7862 -> 8675 (AI Toolkit)
# =======================
server {
    listen 7862;
    server_name _;

    # Serve the wait-page font for the AI Toolkit placeholder
    location = /assets/fonts/Inter-latin.woff2 {
      root /usr/share/nginx/html;
      try_files $uri =404;
      access_log off;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000";
    }

    location / {
      proxy_pass http://127.0.0.1:8675;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Accept-Encoding "";
      proxy_buffering off;
      proxy_read_timeout 86400;
      add_header Cache-Control no-cache;
    }
}

# =======================
# 7863 -> 8888 (JupyterLab)
# Fixes WS + SSE 400s
# =======================
server {
    listen 7863;
    server_name _;    # --- Terminals (WebSocket) ---
    location ~* ^/terminals/ {
      proxy_pass http://127.0.0.1:8888;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_read_timeout 86400;
    }

    # --- Kernel channels (WebSocket) ---
    location ~* ^/api/kernels/.*/channels$ {
      proxy_pass http://127.0.0.1:8888;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_read_timeout 86400;
    }

    # --- Server-Sent Events (activity feed) ---
    location ^~ /api/events/ {
      proxy_pass http://127.0.0.1:8888;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;      # <- critical for SSE
      proxy_read_timeout 86400;
    }

    # --- Everything else ---
    location / {
      proxy_pass http://127.0.0.1:8888;
      proxy_http_version 1.1;

      # Safe to set WS headers everywhere
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Avoid gzip on streamed/chunked responses
      proxy_set_header Accept-Encoding "";

      proxy_intercept_errors on;
      error_page 502 =200 @502;
    }

    location @502 {
      add_header Last-Modified $date_gmt;
      add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
      if_modified_since off; expires off; etag off;
      root /usr/share/nginx/html;
      rewrite ^ /502.html break;
    }
  }
}
